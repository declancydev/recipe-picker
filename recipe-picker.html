<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <title>Declan's Recipe Picker</title>
  <meta name="theme-color" content="#7C9070">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input { font-family: inherit; border: none; outline: none; }
    a { text-decoration: none; color: inherit; }

    /* ===== CSS VARIABLES ===== */
    :root {
      --primary: #7C9070;
      --primary-dark: #5A6B50;
      --primary-light: #A8B89E;
      --accent: #C4704B;
      --accent-light: #E8956E;
      --bg: #FFF8F0;
      --bg-card: #FFFFFF;
      --bg-input: #F5EDE4;
      --text: #2D2D2D;
      --text-secondary: #6B6B6B;
      --text-muted: #999;
      --border: #E8E0D8;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
      --danger: #E74C3C;
      --success: #27AE60;
      --warning: #F39C12;
      --radius: 14px;
      --radius-sm: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1A1A1E;
        --bg-card: #2A2A2E;
        --bg-input: #333338;
        --text: #F0E6D8;
        --text-secondary: #A8A8A8;
        --text-muted: #777;
        --border: #3A3A3E;
        --shadow: 0 2px 8px rgba(0,0,0,0.3);
        --shadow-lg: 0 4px 16px rgba(0,0,0,0.4);
        --primary-light: #6A7E60;
      }
    }

    /* ===== LAYOUT ===== */
    #app {
      max-width: 800px;
      margin: 0 auto;
      padding-top: env(safe-area-inset-top, 0px);
    }
    .view { display: none; }
    .view.active { display: block; }

    /* ===== HEADER ===== */
    .app-header {
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 40;
    }
    .app-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }
    @media (prefers-color-scheme: dark) {
      .app-header h1 { color: var(--primary-light); }
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-input);
      border-radius: var(--radius);
      padding: 10px 14px;
      margin-bottom: 10px;
    }
    .search-box svg { flex-shrink: 0; color: var(--text-muted); }
    .search-box input {
      flex: 1;
      background: transparent;
      font-size: 15px;
      color: var(--text);
    }
    .search-box input::placeholder { color: var(--text-muted); }
    .tag-filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tag-filters::-webkit-scrollbar { display: none; }
    .tag-pill {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      background: var(--bg-input);
      color: var(--text-secondary);
      transition: all 0.15s;
      text-transform: capitalize;
    }
    .tag-pill.active {
      background: var(--primary);
      color: #fff;
    }

    /* ===== RECIPE GRID ===== */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      padding: 4px 16px 100px;
    }
    .recipe-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      border: 2px solid transparent;
    }
    .recipe-card:active { transform: scale(0.97); }
    .recipe-card.selected { border-color: var(--primary); }
    .card-band {
      height: 6px;
      width: 100%;
    }
    .card-image {
      width: 100%;
      height: 120px;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .card-body { padding: 12px; }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 2px;
      color: var(--text);
    }
    .card-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .mini-tag {
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      text-transform: capitalize;
    }
    .card-checkbox {
      position: absolute;
      top: 12px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      z-index: 2;
    }
    .recipe-card.selected .card-checkbox {
      background: var(--primary);
      border-color: var(--primary);
    }
    .card-checkbox svg { opacity: 0; transition: opacity 0.15s; }
    .recipe-card.selected .card-checkbox svg { opacity: 1; }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    /* ===== DETAIL VIEW ===== */
    .detail-view { padding: 0 16px 100px; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0;
      font-size: 15px;
      font-weight: 500;
      color: var(--primary);
    }
    .detail-hero {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }
    .detail-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .detail-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .detail-info {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--bg-input);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .detail-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      transition: all 0.15s;
      min-height: 48px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; flex: 1; }
    .btn-secondary { background: var(--bg-input); color: var(--text); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 8px 14px; font-size: 13px; min-height: 36px; }
    .serving-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .serving-btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      background: var(--bg-input);
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .serving-btn.active {
      background: var(--primary);
      color: #fff;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--border);
    }
    .ingredient-group { margin-bottom: 16px; }
    .ingredient-group h4 {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    @media (prefers-color-scheme: dark) {
      .ingredient-group h4 { color: var(--primary-light); }
    }
    .ingredient-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .ingredient-item:last-child { border-bottom: none; }
    .ingredient-amount {
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
      margin-left: 12px;
    }
    .step-summary { margin-bottom: 20px; }
    .step-summary-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .step-summary-item:last-child { border-bottom: none; }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .step-summary-content h4 { font-size: 14px; font-weight: 600; }
    .step-summary-content p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
    .pantry-note {
      background: var(--bg-input);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .pantry-note strong { color: var(--text); }
    .tools-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ===== SHOPPING VIEW ===== */
    .shopping-view { padding: 0 16px 100px; }
    .shopping-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .shopping-header h2 { font-size: 20px; font-weight: 700; }
    .shopping-recipe-servings {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .shopping-recipe-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .shopping-recipe-name { font-size: 14px; font-weight: 500; flex: 1; margin-right: 8px; }
    .serving-toggle {
      display: flex;
      gap: 4px;
    }
    .serving-toggle button {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: var(--bg-input);
      color: var(--text-secondary);
    }
    .serving-toggle button.active {
      background: var(--primary);
      color: #fff;
    }
    .shopping-category { margin-bottom: 16px; }
    .shopping-category h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--border);
    }
    @media (prefers-color-scheme: dark) {
      .shopping-category h3 { color: var(--primary-light); }
    }
    .shopping-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .shopping-item:last-child { border-bottom: none; }
    .shopping-item.checked { opacity: 0.45; text-decoration: line-through; }
    .shop-check {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .shopping-item.checked .shop-check {
      background: var(--success);
      border-color: var(--success);
    }
    .shop-check svg { opacity: 0; }
    .shopping-item.checked .shop-check svg { opacity: 1; }
    .shop-name { flex: 1; }
    .shop-amount { color: var(--text-secondary); font-weight: 500; font-size: 14px; white-space: nowrap; }
    .shopping-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    /* ===== COOKING MODE ===== */
    #cooking-view {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 100;
      display: none;
      flex-direction: column;
    }
    #cooking-view.active { display: flex; }
    #cooking-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .cooking-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-top: calc(12px + env(safe-area-inset-top, 0px));
    }
    .cooking-exit {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .cooking-ingredients-btn {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: var(--bg-input);
      border-radius: 20px;
    }
    .cooking-progress {
      padding: 0 16px;
      margin-bottom: 4px;
    }
    .cooking-progress-text {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .cooking-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      -webkit-overflow-scrolling: touch;
    }
    .cooking-step-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 16px;
    }
    @media (prefers-color-scheme: dark) {
      .cooking-step-title { color: var(--primary-light); }
    }
    .cooking-instruction {
      font-size: 18px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 16px;
    }
    .cooking-important {
      background: #FFF3E0;
      border-left: 4px solid var(--warning);
      padding: 12px 16px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 16px;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }
    .cooking-important strong {
      display: block;
      color: var(--warning);
      margin-bottom: 4px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    @media (prefers-color-scheme: dark) {
      .cooking-important { background: #3E2E1A; }
    }
    .cooking-tip {
      background: var(--bg-input);
      border-left: 4px solid var(--primary);
      padding: 10px 14px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .cooking-tip strong {
      display: block;
      color: var(--primary);
      margin-bottom: 2px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cooking-thermomix {
      background: #EDE7F6;
      border-left: 4px solid #7E57C2;
      padding: 10px 14px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin-bottom: 16px;
      font-size: 14px;
      color: #4A148C;
      line-height: 1.5;
    }
    .cooking-thermomix strong {
      display: block;
      color: #7E57C2;
      margin-bottom: 2px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    @media (prefers-color-scheme: dark) {
      .cooking-thermomix { background: #2A1E3E; color: #CE93D8; }
      .cooking-thermomix strong { color: #B39DDB; }
    }
    /* Thermomix toggle */
    .tm-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-input);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .tm-toggle.active {
      background: #EDE7F6;
      color: #7E57C2;
    }
    @media (prefers-color-scheme: dark) {
      .tm-toggle.active { background: #2A1E3E; color: #CE93D8; }
    }
    .tm-switch {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: var(--border);
      position: relative;
      transition: background 0.2s;
    }
    .tm-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .tm-toggle.active .tm-switch {
      background: #7E57C2;
    }
    .tm-toggle.active .tm-switch::after {
      transform: translateX(16px);
    }
    .timer-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      margin-top: 4px;
      transition: all 0.15s;
      min-height: 50px;
    }
    .timer-btn:active { transform: scale(0.97); }
    .timer-btn.running {
      background: var(--primary);
      font-variant-numeric: tabular-nums;
    }
    .timer-btn.done {
      background: var(--danger);
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .cooking-nav {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      border-top: 1px solid var(--border);
    }
    .nav-btn {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 50px;
    }
    .nav-btn.prev { background: var(--bg-input); color: var(--text); }
    .nav-btn.next { background: var(--primary); color: #fff; }
    .nav-btn:disabled { opacity: 0.3; pointer-events: none; }
    .cooking-done {
      text-align: center;
      padding: 40px 20px;
    }
    .cooking-done h2 { font-size: 28px; margin-bottom: 8px; }
    .cooking-done p { font-size: 16px; color: var(--text-secondary); margin-bottom: 24px; }

    /* ===== INGREDIENT OVERLAY ===== */
    .overlay-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay-backdrop.visible { opacity: 1; pointer-events: auto; }
    .ingredient-overlay {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 70vh;
      background: var(--bg-card);
      border-radius: var(--radius) var(--radius) 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      z-index: 200;
      padding: 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
    }
    .ingredient-overlay.visible { transform: translateY(0); }
    .overlay-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .overlay-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* ===== BOTTOM BAR ===== */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-bottom));
      display: flex;
      align-items: center;

    /* ===== APP STATE ===== */
    const state = {
      currentView: 'browse',
      selectedRecipes: new Set(),
      currentRecipeId: null,
      currentStep: 0,
      servingSizes: {},

      searchQuery: '',
      activeFilters: new Set(),
      timers: {},
      wakeLock: null,
      thermomixMode: false
    };

    /* ===== PERSISTENCE ===== */
    function saveState() {
      try {
        localStorage.setItem('rp_selected', JSON.stringify([...state.selectedRecipes]));
        localStorage.setItem('rp_servings', JSON.stringify(state.servingSizes));
        localStorage.setItem('rp_checked', JSON.stringify([...state.shoppingChecked]));
        localStorage.setItem('rp_thermomix', state.thermomixMode ? '1' : '0');
      } catch(e) {}
    }
    function loadState() {
      try {
        const sel = JSON.parse(localStorage.getItem('rp_selected') || '[]');
        sel.forEach(id => state.selectedRecipes.add(id));
        state.servingSizes = JSON.parse(localStorage.getItem('rp_servings') || '{}');
        const chk = JSON.parse(localStorage.getItem('rp_checked') || '[]');
        chk.forEach(k => state.shoppingChecked.add(k));
        state.thermomixMode = localStorage.getItem('rp_thermomix') === '1';
      } catch(e) {}
    }

    /* ===== VIEW MANAGEMENT ===== */
    function showView(name, recipeId) {
      state.currentView = name;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      const cookingView = document.getElementById('cooking-view');
      cookingView.classList.remove('active');

      if (name === 'browse') {
        document.getElementById('browse-view').classList.add('active');
        updateBottomBar();
      } else if (name === 'detail') {
        state.currentRecipeId = recipeId;
        document.getElementById('detail-view').classList.add('active');
        renderDetailView(recipeId);
        updateBottomBar();
        window.scrollTo(0, 0);
      } else if (name === 'shopping') {
        document.getElementById('shopping-view').classList.add('active');
        renderShoppingView();
        document.getElementById('bottom-bar').classList.remove('visible');
        window.scrollTo(0, 0);
      } else if (name === 'cooking') {
        state.currentRecipeId = recipeId;
        state.currentStep = 0;
        cookingView.classList.add('active');
        renderCookingView();
        requestWakeLock();
        document.getElementById('bottom-bar').classList.remove('visible');
      }
    }

    function updateBottomBar() {
      const bar = document.getElementById('bottom-bar');
      const count = state.selectedRecipes.size;
      document.getElementById('selected-count').textContent = count;
      if (count > 0 && (state.currentView === 'browse' || state.currentView === 'detail')) {
        bar.classList.add('visible');
      } else {
        bar.classList.remove('visible');
      }
    }

    /* ===== BROWSE VIEW ===== */
    function getAllTags() {
      const tags = new Set();
      RECIPES.forEach(r => r.tags.forEach(t => tags.add(t)));
      return [...tags].sort();
    }

    function getBandClass(recipe) {
      const priority = ['pork', 'chicken', 'veggie', 'vegetarian', 'pasta', 'curry', 'rice'];
      for (const p of priority) {
        if (recipe.tags.includes(p)) return 'band-' + p;
      }
      return 'band-default';
    }

    function renderTagFilters() {
      const tags = getAllTags();
      const el = document.getElementById('tag-filters');

        `<button class="tag-pill ${state.activeFilters.has(tag) ? 'active' : ''}" data-tag="${tag}">${tag}</button>`
      ).join('');
    }

    /* ===== SHOPPING LIST ===== */
    function parseAmount(str) {
      if (!str) return { value: 0, unit: '', raw: str };
      const s = str.trim();
      const match = s.match(/^([\d.]+(?:[\u00bd\u00bc\u00be])?|[\u00bd\u00bc\u00be])\s*(.*)$/);
      if (!match) return { value: 0, unit: s, raw: s };

      let valStr = match[1];
      let unit = match[2].trim().toLowerCase();

      let value = 0;
      if (valStr.includes('\u00bd')) value = parseFloat(valStr.replace('\u00bd', '')) || 0 + 0.5;
      else if (valStr === '\u00bd') value = 0.5;
      else if (valStr === '\u00bc') value = 0.25;
      else if (valStr === '\u00be') value = 0.75;
      else value = parseFloat(valStr) || 0;

      // Normalise plural units
      unit = unit.replace(/s$/, '').replace(/clove$/, 'clove');
      return { value, unit, raw: s };
    }

    function formatAmount(value, unit) {
      if (value === 0 && !unit) return '';
      let v = value;
      // Format fractions
      const frac = v % 1;
      let vStr;
      if (frac === 0) vStr = v.toString();
      else if (Math.abs(frac - 0.5) < 0.01) vStr = (Math.floor(v) || '') + '\u00bd';
      else if (Math.abs(frac - 0.25) < 0.01) vStr = (Math.floor(v) || '') + '\u00bc';
      else if (Math.abs(frac - 0.75) < 0.01) vStr = (Math.floor(v) || '') + '\u00be';
      else vStr = v.toFixed(1);

      // Units that don't pluralise
      const noPlural = ['g', 'ml', 'tbsp', 'tsp'];
      let u = unit;
      if (value !== 1 && !noPlural.includes(u)) u = u + 's';

      return `${vStr} ${u}`.trim();
    }

    function mergeIngredients() {
      const items = {};
      const pantrySet = new Set();

      for (const recipeId of state.selectedRecipes) {
        const recipe = RECIPES.find(r => r.id === recipeId);
        if (!recipe) continue;
        const servings = getServings(recipeId);

        for (const ing of recipe.ingredients) {
          const key = ing.name.toLowerCase().trim();
          const amount = ing.amounts[servings.toString()];
          const parsed = parseAmount(amount);

          if (!items[key]) {
            items[key] = { name: ing.name, category: ing.category, amounts: [] };
          }
          items[key].amounts.push(parsed);
        }

        recipe.pantryItems.forEach(p => pantrySet.add(p));
      }

      // Merge amounts by unit
      const merged = {};
      for (const [key, item] of Object.entries(items)) {
        const byUnit = {};
        for (const a of item.amounts) {
          const u = a.unit;
          if (!byUnit[u]) byUnit[u] = 0;
          byUnit[u] += a.value;
        }
        const display = Object.entries(byUnit)
          .map(([unit, val]) => formatAmount(val, unit))
          .join(' + ');
        merged[key] = { name: item.name, category: item.category, display };
      }

      // Group by category
      const catOrder = ['Meat & Fish', 'Dairy & Eggs', 'Fresh Veg & Herbs', 'Pantry & Dry Goods', 'Sauces & Condiments', 'Other'];
      const categories = {};
      for (const item of Object.values(merged)) {
        const cat = item.category;
        if (!categories[cat]) categories[cat] = [];
        categories[cat].push(item);
      }

      return { categories, catOrder, pantryItems: [...pantrySet].sort() };
    }

    function renderShoppingView() {
      const el = document.getElementById('shopping-content');
      if (state.selectedRecipes.size === 0) {
        el.innerHTML = `
          <button class="back-btn" onclick="showView('browse')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back
          </button>
          <div class="empty-state" style="margin-top:40px">
            <p>No recipes selected. Go back and select some recipes first.</p>
          </div>`;
        return;
      }

      const { categories, catOrder, pantryItems } = mergeIngredients();
      const selectedRecipes = [...state.selectedRecipes].map(id => RECIPES.find(r => r.id === id)).filter(Boolean);

      el.innerHTML = `
        <button class="back-btn" onclick="showView('browse')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back
        </button>
        <div class="shopping-header">
          <h2>Shopping List</h2>
        </div>
        <div class="shopping-actions">
          <button class="btn btn-sm btn-secondary" onclick="copyShoppingList()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-sm btn-secondary" onclick="shareShoppingList()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            Share
          </button>
          <button class="btn btn-sm btn-secondary" onclick="clearChecked()">Clear ticked</button>
        </div>
        <div class="shopping-recipe-servings">
          <div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px">Servings per recipe:</div>
          ${selectedRecipes.map(r => `
            <div class="shopping-recipe-row">
              <div class="shopping-recipe-name">${r.name.length > 30 ? r.name.substring(0, 30) + '...' : r.name}</div>
              <div class="serving-toggle">
                ${r.servings.options.map(s => `
                  <button class="${getServings(r.id) === s ? 'active' : ''}" onclick="setServings('${r.id}', ${s})">${s}P</button>
                `).join('')}
              </div>
            </div>
          `).join('')}
        </div>
        ${catOrder.filter(c => categories[c]).map(cat => `
          <div class="shopping-category">
            <h3>${cat}</h3>
            ${categories[cat].map(item => {
              const key = item.name.toLowerCase();
              const checked = state.shoppingChecked.has(key);
              return `
                <div class="shopping-item ${checked ? 'checked' : ''}" data-shop-key="${key}">
                  <div class="shop-check">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                  </div>
                  <span class="shop-name">${item.name}</span>
                  <span class="shop-amount">${item.display}</span>
                </div>`;
            }).join('')}
          </div>
        `).join('')}
        ${pantryItems.length ? `
          <div class="shopping-category">
            <h3>From Your Pantry</h3>
            ${pantryItems.map(item => {
              const key = 'pantry_' + item.toLowerCase();
              const checked = state.shoppingChecked.has(key);
              return `
                <div class="shopping-item ${checked ? 'checked' : ''}" data-shop-key="${key}">
                  <div class="shop-check">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                  </div>
                  <span class="shop-name">${item}</span>
                  <span class="shop-amount">check stock</span>
                </div>`;
            }).join('')}
          </div>
        ` : ''}
      `;
    }

    function setServings(recipeId, servings) {
      state.servingSizes[recipeId] = servings;
      saveState();
      if (state.currentView === 'shopping') renderShoppingView();
      else if (state.currentView === 'detail') renderDetailView(recipeId);
    }

    function buildShoppingListText() {
      const { categories, catOrder, pantryItems } = mergeIngredients();
      const recipeNames = [...state.selectedRecipes]
        .map(id => RECIPES.find(r => r.id === id))
        .filter(Boolean)
        .map(r => `  ${r.name} (${getServings(r.id)}P)`);

      let text = `Shopping List\n`;
      text += recipeNames.join('\n') + '\n';
      text += '\u2500'.repeat(30) + '\n\n';

      for (const cat of catOrder) {
        if (!categories[cat]) continue;
        text += cat.toUpperCase() + '\n';
        for (const item of categories[cat]) {
          const checked = state.shoppingChecked.has(item.name.toLowerCase());
          text += `${checked ? '\u2611' : '\u2610'} ${item.name} \u2014 ${item.display}\n`;
        }
        text += '\n';
      }

      if (pantryItems.length) {
        text += 'FROM YOUR PANTRY\n';
        pantryItems.forEach(p => {
          const checked = state.shoppingChecked.has('pantry_' + p.toLowerCase());
          text += `${checked ? '\u2611' : '\u2610'} ${p}\n`;
        });
      }

      return text;
    }

    function tryCopy(text) {
      // Try modern API first, then execCommand, then return false
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => showTextModal(text));
        return;
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) { showToast('Copied!'); return; }
      } catch(e) {
        document.body.removeChild(ta);
      }
      showTextModal(text);
    }

    function copyShoppingList() {
      tryCopy(buildShoppingListText());
    }

    function shareShoppingList() {
      const text = buildShoppingListText();
      if (navigator.share && window.isSecureContext) {
        navigator.share({ title: 'Shopping List', text: text }).catch(() => {});
      } else {
        showTextModal(text);
      }
    }

    function showTextModal(text) {
      let modal = document.getElementById('text-modal');
      if (modal) modal.remove();

      modal = document.createElement('div');
      modal.id = 'text-modal';
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML = `
        <div style="background:var(--bg-card);border-radius:var(--radius);padding:16px;width:100%;max-width:400px;max-height:80vh;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <h3 style="font-size:16px;font-weight:700">Shopping List</h3>
            <button onclick="document.getElementById('text-modal').remove()" style="font-size:20px;color:var(--text-muted);padding:4px 8px">\u2715</button>
          </div>
          <textarea id="text-modal-ta" style="flex:1;min-height:250px;font-family:inherit;font-size:13px;line-height:1.5;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-input);color:var(--text);resize:none;white-space:pre-wrap">${text.replace(/</g,'&lt;')}</textarea>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" style="flex:1" onclick="document.getElementById('text-modal-ta').select();document.execCommand('copy');showToast('Copied!');document.getElementById('text-modal').remove()">Select & Copy</button>
            <button class="btn btn-secondary btn-sm" style="flex:1" onclick="document.getElementById('text-modal').remove()">Done</button>
          </div>
          <p style="font-size:12px;color:var(--text-muted);text-align:center">Tap the text, then use Select All + Copy</p>
        </div>
      `;
      document.body.appendChild(modal);
      // Auto-select text
      setTimeout(() => document.getElementById('text-modal-ta').select(), 100);
    }

    function clearChecked() {
      state.shoppingChecked.clear();
      saveState();
      renderShoppingView();
    }

    /* ===== COOKING MODE ===== */
    function renderCookingView() {
      const r = RECIPES.find(x => x.id === state.currentRecipeId);
      if (!r) return;
      const step = r.steps[state.currentStep];
      const total = r.steps.length;
      const isLast = state.currentStep >= total - 1;
      const isFirst = state.currentStep <= 0;
      const timerKey = `${r.id}_${step.number}`;
      const timer = state.timers[timerKey];

      let timerHtml = '';
      if (step.timerMinutes) {
        if (timer && timer.done) {
          timerHtml = `<button class="timer-btn done" onclick="clearTimer('${timerKey}')">Timer Complete! Tap to dismiss</button>`;
        } else if (timer && timer.remaining > 0) {
          timerHtml = `<button class="timer-btn running" onclick="stopTimer('${timerKey}')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            ${formatTime(timer.remaining)}
          </button>`;
        } else {
          timerHtml = `<button class="timer-btn" onclick="startTimer('${timerKey}', ${step.timerMinutes})">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            Start Timer \u2014 ${step.timerMinutes} mins
          </button>`;
        }
      }

      const el = document.getElementById('cooking-content');
      el.innerHTML = `
        <div class="cooking-top">
          <button class="cooking-exit" onclick="exitCooking()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            Exit
          </button>
          <button class="cooking-ingredients-btn" onclick="openIngredientOverlay()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
            Ingredients
          </button>
        </div>
        <div class="cooking-progress">
          <div class="cooking-progress-text">Step ${state.currentStep + 1} of ${total}</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${((state.currentStep + 1) / total) * 100}%"></div>
          </div>
        </div>
        <div class="cooking-content" id="cooking-step-content">
          <h2 class="cooking-step-title">${step.title}</h2>
          <p class="cooking-instruction">${step.instruction}</p>
          ${step.important ? `
            <div class="cooking-important">
              <strong>Important</strong>
              ${step.important}
            </div>
          ` : ''}
          ${step.tip ? `
            <div class="cooking-tip">
              <strong>Tip</strong>
              ${step.tip}
            </div>
          ` : ''}
          ${state.thermomixMode && step.thermomixTip ? `
            <div class="cooking-thermomix">
              <strong>Thermomix TM6</strong>
              ${step.thermomixTip}
            </div>
          ` : ''}
          ${timerHtml}
        </div>
        <div class="cooking-nav">
          <button class="nav-btn prev" onclick="prevStep()" ${isFirst ? 'disabled' : ''}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Previous
          </button>
          <button class="nav-btn next" onclick="${isLast ? 'exitCooking()' : 'nextStep()'}">
            ${isLast ? 'Finish' : 'Next'}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      `;

      // Swipe handling
      const content = document.getElementById('cooking-step-content');
      let startX = 0;
      content.addEventListener('touchstart', e => { startX = e.changedTouches[0].clientX; }, { passive: true });
      content.addEventListener('touchend', e => {
        const diff = e.changedTouches[0].clientX - startX;
        if (Math.abs(diff) > 60) {
          if (diff > 0) prevStep();
          else nextStep();
        }
      }, { passive: true });
    }

    function nextStep() {
      const r = RECIPES.find(x => x.id === state.currentRecipeId);
      if (!r || state.currentStep >= r.steps.length - 1) return;
      state.currentStep++;
      renderCookingView();
    }

    function prevStep() {
      if (state.currentStep <= 0) return;
      state.currentStep--;
      renderCookingView();
    }

    function exitCooking() {
      document.getElementById('cooking-view').classList.remove('active');
      releaseWakeLock();
      showView('detail', state.currentRecipeId);
    }

    function openIngredientOverlay() {
      const r = RECIPES.find(x => x.id === state.currentRecipeId);
      if (!r) return;
      const servings = getServings(r.id);
      const catOrder = ['Meat & Fish', 'Dairy & Eggs', 'Fresh Veg & Herbs', 'Pantry & Dry Goods', 'Sauces & Condiments'];
      const grouped = {};
      r.ingredients.forEach(ing => {
        if (!grouped[ing.category]) grouped[ing.category] = [];
        grouped[ing.category].push(ing);
      });

      const overlay = document.getElementById('ingredient-overlay');
      overlay.innerHTML = `
        <div class="overlay-handle"></div>
        <h3 class="overlay-title">Ingredients (${servings}P)</h3>
        ${catOrder.filter(c => grouped[c]).map(cat => `
          <div class="ingredient-group">
            <h4>${cat}</h4>
            ${grouped[cat].map(ing => `
              <div class="ingredient-item">
                <span>${ing.name}</span>
                <span class="ingredient-amount">${ing.amounts[servings]}</span>
              </div>
            `).join('')}
          </div>
        `).join('')}
        ${r.pantryItems.length ? `<div class="pantry-note"><strong>Pantry:</strong> ${r.pantryItems.join(', ')}</div>` : ''}
      `;
      overlay.classList.add('visible');
      document.getElementById('overlay-backdrop').classList.add('visible');
    }

    function closeIngredientOverlay() {
      document.getElementById('ingredient-overlay').classList.remove('visible');
      document.getElementById('overlay-backdrop').classList.remove('visible');
    }

    /* ===== TIMERS ===== */
    function startTimer(key, minutes) {
      if (state.timers[key] && state.timers[key].intervalId) return;
      state.timers[key] = {
        remaining: minutes * 60,
        done: false,
        intervalId: setInterval(() => {
          state.timers[key].remaining--;
          if (state.timers[key].remaining <= 0) {
            state.timers[key].remaining = 0;
            state.timers[key].done = true;
            clearInterval(state.timers[key].intervalId);
            state.timers[key].intervalId = null;
            // Vibrate + alert
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
            showToast('Timer complete!');
          }
          if (state.currentView === 'cooking') renderCookingView();
        }, 1000)
      };
      renderCookingView();
    }

    function stopTimer(key) {
      if (state.timers[key] && state.timers[key].intervalId) {
        clearInterval(state.timers[key].intervalId);
        state.timers[key].intervalId = null;
      }
      delete state.timers[key];
      renderCookingView();
    }

    function clearTimer(key) {
      delete state.timers[key];
      renderCookingView();
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    /* ===== WAKE LOCK ===== */
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          state.wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch(e) {}
    }

    function releaseWakeLock() {
      if (state.wakeLock) {
        state.wakeLock.release();
        state.wakeLock = null;
      }
    }

    /* ===== TOAST ===== */
    function showToast(msg) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(20px)';
      }, 2000);
    }

    /* ===== SELECTION ===== */
    function toggleSelect(recipeId) {
      if (state.selectedRecipes.has(recipeId)) {
        state.selectedRecipes.delete(recipeId);
      } else {
        state.selectedRecipes.add(recipeId);
      }
      saveState();
      renderBrowseView();
      updateBottomBar();
      if (state.currentView === 'detail') renderDetailView(recipeId);
    }

    function clearSelection() {
      state.selectedRecipes.clear();
      saveState();
      renderBrowseView();
      updateBottomBar();
    }

    /* ===== THERMOMIX TOGGLE ===== */
    function toggleThermomix() {
      state.thermomixMode = !state.thermomixMode;
      saveState();
      updateThermomixToggle();
    }
    function updateThermomixToggle() {
      const btn = document.getElementById('tm-toggle');
      if (btn) btn.classList.toggle('active', state.thermomixMode);
    }

    /* ===== EVENT DELEGATION ===== */
    document.getElementById('recipe-grid').addEventListener('click', e => {
      const selectBtn = e.target.closest('[data-select]');
      if (selectBtn) {
        e.stopPropagation();
        toggleSelect(selectBtn.dataset.select);
        return;
      }
      const card = e.target.closest('.recipe-card');
      if (card) {
        showView('detail', card.dataset.id);
      }
    });

    document.getElementById('tag-filters').addEventListener('click', e => {
      const pill = e.target.closest('.tag-pill');
      if (!pill) return;
      const tag = pill.dataset.tag;
      if (state.activeFilters.has(tag)) state.activeFilters.delete(tag);
      else state.activeFilters.add(tag);
      renderTagFilters();
      renderBrowseView();
    });

    document.getElementById('search-input').addEventListener('input', e => {
      state.searchQuery = e.target.value;
      renderBrowseView();
    });

    document.getElementById('detail-content').addEventListener('click', e => {
      const servBtn = e.target.closest('[data-serving]');
      if (servBtn) {
        const recipeId = servBtn.dataset.recipeId;
        const serving = parseInt(servBtn.dataset.serving);
        setServings(recipeId, serving);
      }
    });

    document.getElementById('shopping-content').addEventListener('click', e => {
      const item = e.target.closest('.shopping-item');
      if (!item) return;
      const key = item.dataset.shopKey;
      if (state.shoppingChecked.has(key)) state.shoppingChecked.delete(key);
      else state.shoppingChecked.add(key);
      saveState();
      item.classList.toggle('checked');
    });

    /* ===== PWA SETUP ===== */
    function setupPWA() {
      // Inline manifest
      const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#7C9070"/><text x="96" y="125" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="80" font-weight="bold">DR</text></svg>`;
      const iconDataUri = 'data:image/svg+xml;base64,' + btoa(iconSvg);

      const manifest = {
        name: "Declan's Recipe Picker",
        short_name: "Recipes",
        start_url: ".",
        display: "standalone",
        background_color: "#FFF8F0",
        theme_color: "#7C9070",
        icons: [{ src: iconDataUri, sizes: "192x192", type: "image/svg+xml", purpose: "any" }]
      };

      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
      document.head.appendChild(link);

      // Apple touch icon
      const appleLink = document.createElement('link');
      appleLink.rel = 'apple-touch-icon';
      appleLink.href = iconDataUri;
      document.head.appendChild(appleLink);
    }

    /* ===== INIT ===== */
    loadState();
    renderTagFilters();
    renderBrowseView();
    updateBottomBar();
    updateThermomixToggle();
    setupPWA();

    // Set default servings for all recipes
    RECIPES.forEach(r => {
      if (!state.servingSizes[r.id]) {
        state.servingSizes[r.id] = r.servings.default;
      }
    });
  </script>
</body>
</html>
